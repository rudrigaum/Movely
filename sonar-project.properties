# ===========================
# Movely - SonarCloud Configuration
# ===========================

# MARK: - Project Identification
sonar.projectKey=rudrigaum_Movely
sonar.organization=rudrigaum
sonar.projectName=Movely
sonar.projectVersion=1.0

# MARK: - Source
sonar.sources=Movely
sonar.tests=MovelyTests
sonar.swift.file.suffixes=.swift

# MARK: - Exclusions
sonar.exclusions=\
  Movely/Resources/**,\
  MovelyUITests/**,\
  DerivedData/**,\
  .build/**,\
  Pods/**

sonar.test.exclusions=\
  MovelyUITests/**

# MARK: - Coverage
sonar.swift.coverage.reportPaths=coverage.xml
sonar.coverageReportPaths=coverage.xml

# MARK: - SwiftLint
sonar.swift.swiftlint.reportPaths=swiftlint-report.json

# MARK: - Source Encoding
sonar.sourceEncoding=UTF-8

# MARK: - SCM
sonar.scm.provider=git