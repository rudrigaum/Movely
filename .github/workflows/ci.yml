# ===========================
# Movely - CI Pipeline
# Triggers: Push e Pull Request
# Jobs: SwiftLint + Build + Tests + SonarCloud
# ===========================

name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # MARK: - SwiftLint
  swiftlint:
    name: SwiftLint
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: |
          swiftlint lint \
            --config .swiftlint.yml \
            --reporter json > swiftlint-report.json || true

      - name: Upload SwiftLint Report
        uses: actions/upload-artifact@v5
        with:
          name: swiftlint-report
          path: swiftlint-report.json
          retention-days: 1

  # MARK: - Build & Test
  build-and-test:
    name: Build & Test
    runs-on: macos-14
    needs: swiftlint

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Cache Swift Packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.build
            ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build
        run: |
          xcodebuild build \
            -project Movely.xcodeproj \
            -scheme Movely \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.5' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Run Tests with Coverage
        run: |
          xcodebuild test \
            -project Movely.xcodeproj \
            -scheme Movely \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.5' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult \
            | xcpretty

      - name: Generate Coverage Report
        run: |
          cat > xccov-to-sonarqube-generic.sh << 'EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          function convert_file {
            local xccovarchive_file="$1"
            local file_name="$2"
            local xccov_options="$3"
            echo "  <file path=\"$file_name\">"
            xcrun xccov view $xccov_options --file "$file_name" "$xccovarchive_file" | \
              sed -n 's/^ *\([0-9]*\): \([0-9]*\).*/    <lineToCover lineNumber="\1" covered="\2"\/>/p' | \
              sed 's/covered="0"/covered="false"/' | \
              sed 's/covered="[0-9]*"/covered="true"/'
            echo "  </file>"
          }

          function xccov_to_generic {
            echo "<coverage version=\"1\">"
            for xccovarchive_file in "$@"; do
              for file_name in $(xcrun xccov view --file-list "$xccovarchive_file"); do
                convert_file "$xccovarchive_file" "$file_name" ""
              done
            done
            echo "</coverage>"
          }

          xccov_to_generic "$@"
          EOF
          chmod +x xccov-to-sonarqube-generic.sh
          ./xccov-to-sonarqube-generic.sh TestResults.xcresult > coverage.xml

      - name: Upload Test Results
        uses: actions/upload-artifact@v5
        if: failure()
        with:
          name: test-results
          path: TestResults.xcresult
          retention-days: 7

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v5
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 1

  # MARK: - SonarCloud Analysis
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download SwiftLint Report
        uses: actions/download-artifact@v5
        with:
          name: swiftlint-report

      - name: Download Coverage Report
        uses: actions/download-artifact@v5
        with:
          name: coverage-report

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
